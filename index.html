<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- bootstrap icon -->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!-- custom css -->
    <link rel="stylesheet" href="./assets/css/style.css" />
    <title>Todo List App</title>
  </head>
  <body>
    <header>
      <nav class="navbar bg-body-tertiary mb-3">
        <div class="container-fluid">
          <span class="navbar-brand h1">Dashboard</span>
        </div>
      </nav>
    </header>
    <main>
      <div
        style="grid-template-columns: 1fr 3fr"
        class="d-grid gap-0 column-gap-3"
      >
        <div class="p-2 sidebar rounded-end">
          <h2 class="text-center">Sidebar</h2>
          <div class="container">
            <div class="list-group">
              <ul>
                <li class="mb-2"> <i class="bi bi-speedometer"></i> Dashboard</li>
                <li class="mb-2"><i class="bi bi-exclamation-lg"></i>Vital Task</li>
                <li class="mb-2">My Task</li>
                <li class="mb-2">Setting</li>
                <li class="mb-2">Help</li>
              </ul>
            </div>
          </div>
        </div>

        <div class="p-2 main-content border rounded-start">
          <div class="container">
            <h2 class="text-center">Dashboard Overview</h2>
            <form>
              <div class="mb-3">
                <label for="inputText" class="form-label container-fluif"
                  >Todo List:</label
                >
                <input type="text" class="userInput" id="inputText" />
                <button type="button" class="btn btn-primary">Add</button>
              </div>
              <div class="d-grid gap-2 col-2 mx-auto"></div>
              <div class="container-fluid mt-4">
                <div class="card">
                  <div class="card-body test"></div>
                </div>
              </div>
            </form>
          </div>
        </div>
      </div>
      
    </main>

    <footer></footer>
    <!-- bootstrap script -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <!-- script -->
    <script src="./assets/js/script.js"></script>
  </body>
</html>
